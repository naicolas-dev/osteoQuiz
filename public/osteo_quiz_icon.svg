<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1714" />
      <stop offset="100%" stop-color="#14261d" />
    </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

  <g filter="url(#neonGlow)">
    <!-- Base Glow Layer -->
    <path d="M 180 200 C 180 100, 332 100, 332 200 C 332 270, 256 260, 256 310" 
          fill="none" stroke="#059669" stroke-width="45" stroke-linecap="round" />
    <circle cx="165" cy="205" r="28" fill="#059669" />
    <circle cx="195" cy="200" r="28" fill="#059669" />
    <circle cx="242" cy="305" r="26" fill="#059669" />
    <circle cx="270" cy="305" r="26" fill="#059669" />
    <ellipse cx="256" cy="390" rx="30" ry="25" fill="#059669" />
    
    <!-- Core Bone Layer -->
    <path d="M 180 200 C 180 100, 332 100, 332 200 C 332 270, 256 260, 256 310" 
          fill="none" stroke="#22c55e" stroke-width="32" stroke-linecap="round" />
    <circle cx="165" cy="205" r="20" fill="#22c55e" />
    <circle cx="195" cy="200" r="20" fill="#22c55e" />
    <circle cx="242" cy="305" r="18" fill="#22c55e" />
    <circle cx="270" cy="305" r="18" fill="#22c55e" />
    <ellipse cx="256" cy="390" rx="22" ry="18" fill="#22c55e" />
  </g>

  <!-- Inner Highlight for 3D UI Look -->
  <path d="M 180 200 C 180 100, 332 100, 332 200 C 332 270, 256 260, 256 310" 
        fill="none" stroke="#86efac" stroke-width="12" stroke-linecap="round" />
  <circle cx="165" cy="205" r="8" fill="#86efac" />
  <circle cx="195" cy="200" r="8" fill="#86efac" />
  <circle cx="242" cy="305" r="8" fill="#86efac" />
  <circle cx="270" cy="305" r="8" fill="#86efac" />
  <ellipse cx="256" cy="390" rx="10" ry="8" fill="#86efac" />
  
  <!-- Final White Specular Highlight -->
  <path d="M 180 200 C 180 110, 332 110, 332 200 C 332 265, 256 260, 256 310" 
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
</svg>
